<!doctype html>
<html lang="es" data-theme="cream">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Diccionario contextual</title>
  <link rel="stylesheet" href="./stylesdic.css" />
</head>
<body>
  <header class="dic-header">
    <div class="dic-wrap">
            <div class="dic-header-top">
        <button type="button" id="dicBackButton" class="dic-back-btn">← Volver</button>
        <h1>Diccionario Teológico Bíblico por contextos</h1>
        <p id="dicTotalEntries" class="dic-total">0 entradas disponibles</p>
      </div>
      <p class="dic-subtitle">Extraído de los estudios del profesor Eric de Jesus Rodríguez.</p>
      <form id="dicSearchForm" class="dic-search-form">
  <input id="dicSearch" class="dic-search" type="search" placeholder="Buscar por hebreo, transliteración, español, observación o libro..." autocomplete="off" />
          <button type="submit" id="dicSearchButton" class="dic-search-btn">Buscar</button>
      </form>
    </div>
  </header>

  <section class="dic-filters dic-wrap" id="dicFilters" aria-label="Filtros por libro"></section>

  <main class="dic-layout dic-wrap">
    <section class="dic-results-panel" aria-live="polite">
      <div class="dic-results-head">
        <h2>Resultados</h2>
        <p id="dicCount">Cargando...</p>
      </div>
      <div id="dicResults" class="dic-results"></div>
    </section>

    <aside class="dic-detail-panel" id="dicDetailPanel">
      <h2>Detalle contextual</h2>
      <div id="dicDetail" class="dic-detail-empty">Selecciona una tarjeta para ver sus detalles.</div>
    </aside>
  </main>

  <script>
  const LIBROS = ['Todos', 'Parashot', 'Salmos', 'Qohelet', 'Shir Hashirim', 'Juan', '1 Tesalonicenses', '2 Tesalonicenses', 'Efesios', 'Apocalipsis'];

const SOURCES = [
  { libro: 'Parashot', url: './dic/Diccionarioboton/diccionario_parashot.json' },
  { libro: 'Salmos', url: './dic/Diccionarioboton/diccionario_salmos.json' },
  { libro: 'Qohelet', url: './dic/Diccionarioboton/diccionario_qohelet.json' },
  { libro: 'Shir Hashirim', url: './dic/Diccionarioboton/diccionario_shir_hashirim.json' },
    { libro: 'Juan', url: './dic/Diccionarioboton/diccionario_Juan.json' },
  { libro: '1 Tesalonicenses', url: './dic/Diccionarioboton/diccionario_1tesalonicenses.json' },
  { libro: '2 Tesalonicenses', url: './dic/Diccionarioboton/diccionario_2tesalonicenses.json' },
  { libro: 'Efesios', url: './dic/Diccionarioboton/diccionario_efesios.json' },
  { libro: 'Apocalipsis', url: './dic/Diccionarioboton/diccionario_apocalipsis.json' },
];
 
    const state = {
      query: '',
      filter: 'Todos',
      entries: [],
      filtered: [],
      activeId: null,
    };

    const searchInput = document.getElementById('dicSearch');
        const searchForm = document.getElementById('dicSearchForm');
    const filtersEl = document.getElementById('dicFilters');
    const resultsEl = document.getElementById('dicResults');
    const detailEl = document.getElementById('dicDetail');
    const countEl = document.getElementById('dicCount');
        const totalEntriesEl = document.getElementById('dicTotalEntries');

    const safe = (value) => String(value ?? '');
    const stripHebrewDiacritics = (text) => safe(text).normalize('NFD').replace(/[\u0591-\u05C7]/g, '').trim();
     const normalizeSearchText = (text) => safe(text).normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim();
    const hasHebrewChars = (text) => /[\u0590-\u05FF]/.test(text);
    const hasSpanishMarkers = (text) => /[áéíóúñü¿¡]/i.test(text);
      const capitalizeSentence = (text) => text.replace(/^([a-záéíóúñü])/i, (char) => char.toUpperCase());
    const formatObservationHtml = (value) => {
      const text = safe(value).trim();
      if (!text) return 'Sin observación.';

      const sentences = text
        .split('.')
        .map((item) => item.trim())
        .filter(Boolean)
        .map((item) => `<span class="dic-observation-line">${capitalizeSentence(item)}.</span>`);

      return sentences.length ? sentences.join('') : 'Sin observación.';
    };

    function getSearchFieldPriority(queryRaw) {
      if (hasHebrewChars(queryRaw)) {
        return ['texto_hebreo', 'transliteracion', 'equivalencia_espanol'];
      }
      if (hasSpanishMarkers(queryRaw)) {
        return ['equivalencia_espanol', 'transliteracion', 'texto_hebreo'];
      }
      return ['transliteracion', 'equivalencia_espanol', 'texto_hebreo'];
    }


    function makeFilterButtons() {
      filtersEl.innerHTML = '';
      LIBROS.forEach((libro) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = `dic-filter-btn ${state.filter === libro ? 'is-active' : ''}`;
        button.textContent = libro;
        button.setAttribute('aria-pressed', String(state.filter === libro));
        button.addEventListener('click', () => {
          state.filter = libro;
          applyFilters();
          makeFilterButtons();
        });
        filtersEl.appendChild(button);
      });
    }

 function rankEntryByQuery(entry, rawQuery) {
      const query = normalizeSearchText(rawQuery);
      if (!query) return { matches: true, fieldRank: -1, indexRank: -1 };

      const orderedFields = getSearchFieldPriority(rawQuery);
      for (let fieldIndex = 0; fieldIndex < orderedFields.length; fieldIndex += 1) {
        const field = orderedFields[fieldIndex];
        const value = normalizeSearchText(entry[field]);
        const index = value.indexOf(query);
        if (index >= 0) {
          return { matches: true, fieldRank: fieldIndex, indexRank: index };
        }
      }

      const secondaryFields = [entry.observacion, entry.libro];
      for (const valueRaw of secondaryFields) {
        const value = normalizeSearchText(valueRaw);
        const index = value.indexOf(query);
        if (index >= 0) {
          return { matches: true, fieldRank: 99, indexRank: index };
        }
      }

      return { matches: false, fieldRank: 999, indexRank: 999 };
}

    function applyFilters() {
        state.filtered = state.entries
        .map((entry, sourceIndex) => ({
          entry,
          sourceIndex,
          rank: rankEntryByQuery(entry, state.query),
        }))
        .filter(({ entry, rank }) => {
          const byBook = state.filter === 'Todos' || entry.libro === state.filter;
          return byBook && rank.matches;
        })
        .sort((a, b) => (
          a.rank.fieldRank - b.rank.fieldRank
          || a.rank.indexRank - b.rank.indexRank
          || a.sourceIndex - b.sourceIndex
        ))
        .map(({ entry }) => entry);
      if (!state.filtered.some((entry) => entry.id === state.activeId)) {
        state.activeId = state.filtered[0]?.id ?? null;
      }

      renderResults();
      renderDetail();
    }

    function renderResults() {
      countEl.textContent = `${state.filtered.length} resultado(s)`;

      if (!state.filtered.length) {
        resultsEl.innerHTML = '<p class="dic-empty">No hay resultados para los criterios actuales.</p>';
        return;
      }

      resultsEl.innerHTML = '';
      const fragment = document.createDocumentFragment();

      state.filtered.forEach((entry) => {
        const card = document.createElement('article');
        card.className = `dic-card ${entry.id === state.activeId ? 'is-active' : ''}`;
        card.tabIndex = 0;
        card.setAttribute('role', 'button');

        card.innerHTML = `
          <p class="dic-hebrew">${safe(entry.texto_hebreo) || '—'}</p>
          <p class="dic-translit">${safe(entry.transliteracion) || '—'}</p>
          <p class="dic-meaning">${safe(entry.equivalencia_espanol) || '—'}</p>
          <p class="dic-meta">${safe(entry.observacion) || 'Sin observación.'}</p>
                  `;

        const activate = () => {
          state.activeId = entry.id;
          renderResults();
          renderDetail();
        };

        card.addEventListener('click', activate);
        card.addEventListener('keydown', (event) => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            activate();
          }
        });

        fragment.appendChild(card);
      });

      resultsEl.appendChild(fragment);
    }

    function renderDetail() {
      const active = state.filtered.find((entry) => entry.id === state.activeId);
      if (!active) {
        detailEl.className = 'dic-detail-empty';
        detailEl.textContent = 'Selecciona una tarjeta para ver sus detalles.';
        return;
      }

      const lemma = stripHebrewDiacritics(active.texto_hebreo);
      const related = state.entries
        .filter((entry) => entry.id !== active.id && stripHebrewDiacritics(entry.texto_hebreo) === lemma);


      const makeRelatedHtml = (entries, emptyMessage) => entries.length
        ? entries.map((entry) => `
            <li class="dic-related-item">
             <strong>${safe(entry.libro)}</strong>
              <div class="dic-related-meaning">${safe(entry.equivalencia_espanol) || safe(entry.transliteracion) || '—'}</div>
              <small class="dic-related-observation">${formatObservationHtml(entry.observacion)}</small>
                          </li>
          `).join('')
: `<li class="dic-related-item">${emptyMessage}</li>`;

      const relatedHtml = makeRelatedHtml(
        related,
        'No se encontraron entradas relacionadas para este lema.'
      );

 

      detailEl.className = '';
      detailEl.innerHTML = `
        <div class="dic-detail-main">
          <p class="dic-hebrew">${safe(active.texto_hebreo) || '—'}</p>
          <p class="dic-translit">${safe(active.transliteracion) || '—'}</p>
          <p class="dic-meaning">${safe(active.equivalencia_espanol) || '—'}</p>
          <p class="dic-observation">${formatObservationHtml(active.observacion)}</p>
                    <div class="dic-tags">
            <span class="dic-tag">${safe(active.libro)}</span>
            <span class="dic-tag">Lema ${lemma || '—'}</span>
          </div>
        </div>

        <section class="dic-related">
          <h3>Entradas relacionadas por lema</h3>
                    <ul>${relatedHtml}</ul>
        </section>

      `;
    }

    async function loadSources() {
      const loaded = await Promise.all(
        SOURCES.map(async (source) => {
          const response = await fetch(source.url);
          if (!response.ok) {
            throw new Error(`No se pudo cargar ${source.url} (HTTP ${response.status})`);
          }

          const rows = await response.json();
          if (!Array.isArray(rows)) return [];

          return rows
            .filter((entry) => entry && typeof entry === 'object')
            .map((entry) => ({
              id: entry.id,
              texto_hebreo: entry.texto_hebreo,
              transliteracion: entry.transliteracion,
              equivalencia_espanol: entry.equivalencia_espanol,
              observacion: entry.observacion,
              libro: source.libro,
            }));
        })
      );

      return loaded.flat();
    }

    async function init() {
      try {
        state.entries = await loadSources();
         totalEntriesEl.textContent = `${state.entries.length} entradas disponibles`;


        makeFilterButtons();
        applyFilters();
      } catch (error) {
                totalEntriesEl.textContent = '0 entradas disponibles';
        countEl.textContent = '0 resultado(s)';
        resultsEl.innerHTML = '<p class="dic-empty">No se pudieron cargar los archivos del diccionario.</p>';
        detailEl.className = 'dic-detail-empty';
        detailEl.textContent = `Error: ${error.message}`;
      }
    }

  function runSearch() {
      state.query = searchInput.value.trim();
      applyFilters();
       }

    searchForm.addEventListener('submit', (event) => {
      event.preventDefault();
      runSearch();
    });

 function buildReaderReturnUrl() {
      let target = './index.html';
      try {
        const rawState = sessionStorage.getItem('lectorState');
        const state = rawState ? JSON.parse(rawState) : null;
        const refSearch = String(state?.lastReferenceSearch || localStorage.getItem('lectorLastReferenceSearch') || '').trim();
        const book = String(state?.currentBookSlug || '').trim();
        const name = String(state?.currentBookName || '').trim();

        if (refSearch) {
          const p = new URLSearchParams();
          if (book) p.set('book', book);
          if (name) p.set('name', name);
          p.set('search', refSearch);
          p.set('version', 'RVR1960');
          p.set('orig', '1');
          target = `./index.html?${p.toString()}`;
        }
      } catch (_) {}
      return target;
    }

    function resolveBackTarget() {
      try {
        const params = new URLSearchParams(window.location.search);
        const from = params.get('from');
        if (from) {
          return decodeURIComponent(from);
        }
      } catch (_) {}

      try {
        const referrer = String(document.referrer || '');
        if (referrer.includes('/analisis/buscador_comparativo.html')) {
          return './analisis/buscador_comparativo.html';
        }
      } catch (_) {}

      return buildReaderReturnUrl();
    }

    const backButton = document.getElementById('dicBackButton');
    if (backButton) {
      backButton.addEventListener('click', () => {
        window.location.href = resolveBackTarget();
      });
    }
    init();
  </script>
</body>
</html>
